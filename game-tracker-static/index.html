<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" id="themeColorMeta" content="#0e0e10">
  <title>Game Tracker</title>
  <meta name="description" content="Your personal gaming journal — track time, log sessions, build your library.">

  <!-- Prevent flash of unstyled content — apply saved theme immediately -->
  <script>
    try {
      const u = sessionStorage.getItem('gt_user');
      if (u) {
        const t = localStorage.getItem('gt_theme_' + u);
        if (t) document.documentElement.setAttribute('data-theme', t);
        const a = localStorage.getItem('gt_accent_' + u);
        if (a) document.documentElement.style.setProperty('--accent', a);
      }
    } catch(e) {}
  </script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>

<!-- ── Navigation ─────────────────────────────────── -->
<nav class="nav" id="app-nav" style="display:none">
  <button class="nav-logo" data-nav="dashboard">🎮 GAME TRACKER</button>

  <!-- Desktop nav links -->
  <div class="nav-links" id="desktopNav">
    <button data-nav="dashboard"      class="nav-btn">Dashboard</button>
    <button data-nav="library"        class="nav-btn">Library</button>
    <button data-nav="log"            class="nav-btn">Log</button>
    <button data-nav="session-logger" class="nav-btn">⏱ Session</button>
    <button data-nav="stats"          class="nav-btn">Stats</button>
    <button data-nav="wishlist"       class="nav-btn">Wishlist</button>
    <button data-nav="browse"         class="nav-btn">Browse</button>
  </div>

  <div class="nav-actions">
    <button class="nav-user" data-nav="profile">
      <div class="nav-avatar" id="navAvatar">?</div>
      <span id="navUsername" class="nav-username-label"></span>
    </button>
    <button class="btn-icon" data-nav="settings" title="Settings">⚙</button>
    <!-- Hamburger — mobile only -->
    <button class="btn-icon hamburger-btn" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">☰</button>
  </div>
</nav>

<!-- Mobile dropdown menu -->
<div class="mobile-menu" id="mobileMenu" style="display:none">
  <button data-nav="dashboard">Dashboard</button>
  <button data-nav="library">Library</button>
  <button data-nav="log">Log</button>
  <button data-nav="session-logger">⏱ Session Logger</button>
  <button data-nav="stats">Stats</button>
  <button data-nav="wishlist">Wishlist</button>
  <button data-nav="browse">Browse</button>
  <button data-nav="profile">Profile</button>
  <button data-nav="settings">Settings</button>
</div>

<!-- ── Main view mount ────────────────────────────── -->
<main id="app" class="main">
  <div style="text-align:center;padding:4rem;color:var(--text3)">
    <div style="font-size:2rem;margin-bottom:1rem">🎮</div>
    <p>Loading…</p>
  </div>
</main>

<!-- ── Toast container ────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── App bootstrap ──────────────────────────────── -->
<script type="module" src="js/app.js"></script>

</body>
</html>
